{% extends "layout.html" %}
{% block content %}
<div class="upload-container">
    <h1>Ask questions about your data</h1>
    <p class="subtitle">Upload any CSV and ask questions in plain English</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form action="/" method="POST" enctype="multipart/form-data">
        <div class="upload-box" id="uploadBox">
            <input type="file" name="file" id="fileInput"
                   accept=".csv" required>
            <label for="fileInput">
                <span class="upload-icon">↑</span>
                <span id="uploadLabel">Drop your CSV here or click to browse</span>
            </label>
        </div>
        <button type="submit" class="btn-primary">Upload and Analyse</button>
    </form>

    <div class="divider">or</div>
    <a href="/demo" class="btn-secondary">Try with demo sales data</a>
</div>

<script>
    document.getElementById('fileInput').addEventListener('change', function() {
        const label = document.getElementById('uploadLabel');
        label.textContent = this.files[0] ?
            this.files[0].name : 'Drop your CSV here or click to browse';
    });
</script>
{% endblock %}
